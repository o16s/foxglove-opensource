name: Build Desktop

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            build-cmd: build:mac
            artifact-name: desktop-mac-arm64
          - os: macos-latest
            build-cmd: build:mac-x64
            artifact-name: desktop-mac-x64
          - os: windows-latest
            build-cmd: build:win
            artifact-name: desktop-windows
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack
        run: corepack enable

      - name: Install monorepo dependencies
        run: yarn install

      - name: Build web app
        run: yarn web:build:prod

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install

      - name: Build and publish desktop app
        working-directory: desktop
        run: npm run ${{ matrix.build-cmd }} -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/*.exe

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false --latest --generate-notes
